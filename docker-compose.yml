version: "3.9"
services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_profiler
      POSTGRES_USER: school_profiler
      POSTGRES_PASSWORD: school_profiler
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
